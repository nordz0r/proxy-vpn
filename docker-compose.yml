services:
  vpn-proxy:
    image: ghcr.io/nordz0r/proxy-vpn:latest
    container_name: vpn-proxy
    env_file:
      - .env
    expose:
      - "3128"   # HTTP proxy
      - "1080"   # SOCKS5 proxy
      - "9999"   # Metrics (if METRICS_PORT=9999)
    network_mode: host
    volumes:
      - ${PWD}/conf/xray.json:/etc/xray/conf.json:ro
    restart: unless-stopped
